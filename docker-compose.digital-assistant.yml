# Docker Compose for 飞小助 (feixiaozhu)
# Usage: docker compose -f docker-compose.digital-assistant.yml up -d

services:
  openclaw-gateway:
    build: .
    container_name: openclaw-feixiaozhu
    restart: unless-stopped
    volumes:
      - /Volumes/macpro_data/openclaw_data/feixiaozhu:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace-feixiaozhu
    environment:
      - HOME=/home/node
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--bind",
        "loopback",
        "--port",
        "18789",
        "--force",
      ]
